services:
  zomato_app:
    build: ./zomato-web-app
    image: zomato-image
    container_name: zomato-cont
    ports:
      - "8081:80"
    volumes:  
      - ./zomato-web-app:/usr/share/nginx/html   # bind mount (code)
      - zomato_volume:/var/log/nginx             # external volume (logs)
    networks:  
      - my_network

  amazon_app:
    build: ./Amazon-Clone
    image: amazon-image
    container_name: amazon-cont
    ports:
      - "8082:80"
    volumes:
      - ./Amazon-Clone:/usr/share/nginx/html     # bind mount (code)
      - amazon_volume:/var/log/nginx             # external volume (logs)
    networks:  
      - my_network

networks:  
  my_network:
    driver: bridge

volumes:
  zomato_volume:
  amazon_volume:
