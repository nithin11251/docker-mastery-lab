services:    # This line defines the services that will be run in the Docker Compose setup. Each service represents a container that will be created and managed by Docker Compose. In this case, there are three services defined: `maven-app`, `web`, and `ubuntu`.
  web:       # This line defines a service named `web`. The `web` service will use the `nginx:latest` image, which is the latest version of the Nginx web server. The `ports` section maps port 8080 on the host machine to port 80 in the container, allowing access to the Nginx server from the host machine.
    image: nginx:latest # Use the latest Nginx image
    ports:  # This line specifies the port mapping for the `web` service. It maps port 8080 on the host machine to port 80 in the container, allowing access to the Nginx server from the host machine.
      - "8080:80" #   This line maps port 8080 on the host machine to port 80 in the container, allowing access to the Nginx server from the host machine.
  ubuntu:    # This line defines a service named `ubuntu`. The `ubuntu` service will use the `ubuntu:latest` image, which is the latest version of the Ubuntu operating system. The `command` section specifies that the container should run the command `tail -f /dev/null`, which keeps the container running indefinitely without exiting. This is useful for keeping the container alive for testing or development purposes.
    image: ubuntu:latest
    container_name: ubuntu_container  # This line specifies the name of the container that will be created for the `ubuntu` service. The container will be named `ubuntu_container`, which can be used to reference the container in other commands or configurations.
    command: tail -f /dev/null   # This line specifies the command that will be run when the `ubuntu` container is started. The command `tail -f /dev/null` keeps the container running indefinitely without exiting, which is useful for keeping the container alive for testing or development purposes.
